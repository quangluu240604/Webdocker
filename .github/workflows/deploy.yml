name: Build and Deploy Docker App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR (Maven Wrapper)
        run: |
          chmod +x ./mvnw
          ./mvnw -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            gm240604/webbanhang:latest
            gm240604/webbanhang:${{ github.sha }}

      - name: Triển khai lên DevOps Classroom
        run: |
          set -euo pipefail

          REPO="gm240604/webbanhang"
          # Slot S3: port ngoai 21075, app trong container port 80.
          CONTAINER_PORT=80
          URL="${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=3&container_port=$CONTAINER_PORT&strict_container_port=0"

          # Cloudflare có thể trả 524 (timeout) dù deploy vẫn chạy ở backend.
          # Với 524: coi như đã kích hoạt deploy, không fail CI; kiểm tra dashboard Logs/Trạng thái.
          ATTEMPTS=5
          SLEEP_SEC=3

          for i in $(seq 1 "$ATTEMPTS"); do
            RESPONSE="$(curl -sS -L --connect-timeout 10 --max-time 30 --retry 2 --retry-all-errors --retry-delay 2 -w "\n%{http_code}" -X POST "$URL" || true)"
            BODY="$(printf "%s" "$RESPONSE" | sed '$d')"
            CODE="$(printf "%s" "$RESPONSE" | tail -n1 | tr -d '\r')"

            echo "Webhook HTTP: ${CODE:-<none>} (attempt $i/$ATTEMPTS)"

            if [ "${CODE:-}" = "409" ]; then
              echo "Deploy thất bại (409 Conflict): container của slot đã tồn tại nên backend không tạo được container mới."
              echo "Cách xử lý: vào dashboard DevOps Classroom và Stop/Remove/Reset slot 2 (xoá container cũ), rồi deploy lại; hoặc chọn slot khác nếu được."
              echo "::group::Chi tiết webhook (raw)"
              echo "$BODY"
              echo "::endgroup::"
              exit 1
            fi

            if [ -n "${CODE:-}" ] && [ "$CODE" -ge 200 ] 2>/dev/null && [ "$CODE" -lt 300 ] 2>/dev/null; then
              echo "Deploy thành công."
              echo "::group::Chi tiết webhook JSON"
              echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
              echo "::endgroup::"
              exit 0
            fi

            if [ "${CODE:-}" = "524" ]; then
              echo "Webhook timeout (524). Deploy có thể vẫn đang chạy; kiểm tra dashboard Logs/Trạng thái."
              echo "::group::Chi tiết webhook (raw)"
              echo "$BODY"
              echo "::endgroup::"
              exit 0
            fi

            if [ "${CODE:-}" = "000" ] || [ -z "${CODE:-}" ]; then
              if [ "$i" -lt "$ATTEMPTS" ]; then
                echo "Webhook không trả response (CODE=000). Thử lại sau ${SLEEP_SEC}s..."
                sleep "$SLEEP_SEC"
                continue
              fi
              echo "Webhook không trả response (CODE=000) sau $ATTEMPTS lần. Khong fail CI; hay kiem tra dashboard Logs/Trạng thái."
              exit 0
            fi

            if [ "$i" -lt "$ATTEMPTS" ]; then
              echo "Deploy chưa thành công. Thử lại sau ${SLEEP_SEC}s..."
              sleep "$SLEEP_SEC"
            fi
          done

          echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
          echo "::group::Chi tiết webhook (raw)"
          echo "$BODY"
          echo "::endgroup::"
          exit 1
