<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<th:block th:replace="~{layout::link-css}"></th:block>
<th:block th:replace="~{layout::custom-css}"></th:block>
<title>Add Book</title>
</head>
<body>
<th:block th:replace="~{layout::header}"></th:block>
<div class="container">
<h1>Add Book</h1>
<div th:if="${errors}" class="alert alert-danger">
<ul class="mb-0">
<li th:each="err : ${errors}" th:text="${err}"></li>
</ul>
</div>
<form th:action="@{/books/add}" th:object="${book}" method="post">
<div class="col-6 mb-3">
<label class="form-label" for="title">Title:</label><span class="text-danger">*</span>
<input class="form-control" required type="text" th:field="*{title}" id="title" placeholder="Enter title" autofocus>
</div>
<div class="col-6 mb-3">
<label class="form-label" for="author">Author:</label>
<input class="form-control" type="text" th:field="*{author}" id="author" placeholder="Enter author">
</div>
<div class="col-6 mb-3">
<label class="form-label" for="price">Price:</label><span class="text-danger">*</span>
<input class="form-control" required type="text" th:field="*{price}" id="price" placeholder="Enter price">
</div>
<div class="col-6 mb-3">
<label class="form-label" for="stockQuantity">Stock:</label>
<input class="form-control" type="number" min="0" th:field="*{stockQuantity}" id="stockQuantity" placeholder="Enter stock quantity">
</div>
<div class="col-6 mb-3">
<label class="form-label" for="imageUrl">Image URL:</label>
<input class="form-control" type="text" th:field="*{imageUrl}" id="imageUrl" placeholder="https://...">
</div>
<div class="col-6 mb-3">
<label class="form-label" for="description">Description:</label>
<textarea class="form-control" th:field="*{description}" id="description" rows="3" placeholder="Enter short description"></textarea>
</div>
<div class="col-6 mb-3">
<label class="form-label" for="category">Category:</label><span class="text-danger">*</span>
<select class="form-control" id="category" name="category.id">
<option value="">-- Select Category --</option>
<option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
</select>
</div>
<input type="submit" class="btn btn-primary" value="Save">
</form>
<br>
<a th:href="@{/books}">Back to List</a>
</div>
<th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
