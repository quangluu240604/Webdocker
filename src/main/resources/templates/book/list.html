<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Store</title>
<th:block th:replace="~{layout::link-css}"></th:block>
<th:block th:replace="~{layout::custom-css}"></th:block>
</head>
<body>
<th:block th:replace="~{layout::header}"></th:block>
<main class="page-content">
  <div class="page-section">
    <div class="section-header">
      <div>
        <p class="badge">Thư viện</p>
        <h2>Book Catalog</h2>
      </div>
      <form class="book-filter" onsubmit="searchBooks(event)">
        <input class="form-control" type="search" placeholder="Search by title or author" id="keyword">
        <button class="btn btn-pill btn-outline-dark" type="submit">Search</button>
        <button class="btn btn-pill btn-outline-dark" type="button" onclick="loadBooks()">Reset</button>
      </form>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div id="bookGrid" class="book-grid"></div>
  </div>
</main>
<th:block th:replace="~{layout::footer}"></th:block>
<span id="isAdmin" sec:authorize="hasAnyAuthority('ADMIN')" hidden>true</span>

<script th:inline="javascript">
const csrfToken = /*[[${_csrf.token}]]*/ "";
const csrfHeader = /*[[${_csrf.headerName}]]*/ "";
const isAdmin = !!document.getElementById("isAdmin");

function badgeForStock(stock) {
  if ((stock ?? 0) > 0) {
    return `<span class="badge" style="background: rgba(26,165,108,0.2); color: var(--green-dark);">In stock: ${stock}</span>`;
  }
  return `<span class="badge">Out of stock</span>`;
}

function renderBooks(books) {
  const grid = document.getElementById("bookGrid");
  grid.innerHTML = "";
  books.forEach(book => {
    const image = book.imageUrl && book.imageUrl.trim() !== ""
      ? book.imageUrl
      : "https://via.placeholder.com/640x480?text=No+Image";
    const actionsId = `actions-${book.id}`;
    const card = document.createElement("div");
    card.className = "book-card";
    card.innerHTML = `
      <img src="${image}" alt="${book.title ?? "Book"}">
      <div class="book-card-body">
        <div>${badgeForStock(book.stockQuantity)}</div>
        <h5>${book.title ?? ""}</h5>
        <p class="text-secondary">${book.author ?? ""}</p>
        <p class="price"><strong>${book.price ?? 0}</strong></p>
        <p class="text-muted small">${book.category ?? "N/A"}</p>
        <div class="card-actions" id="${actionsId}"></div>
      </div>
    `;
    grid.appendChild(card);
    const actionRoot = card.querySelector(`#${actionsId}`);

    const detail = document.createElement("a");
    detail.className = "btn btn-outline-dark";
    detail.href = `/books/${book.id}`;
    detail.textContent = "Detail";
    actionRoot.appendChild(detail);

    if (isAdmin) {
      const edit = document.createElement("a");
      edit.className = "btn btn-primary";
      edit.href = `/books/edit/${book.id}`;
      edit.textContent = "Edit";
      actionRoot.appendChild(edit);

      const del = document.createElement("button");
      del.className = "btn btn-danger";
      del.textContent = "Delete";
      del.type = "button";
      del.addEventListener("click", () => deleteBook(book.id));
      actionRoot.appendChild(del);
    }

    const cartBtn = document.createElement("button");
    cartBtn.className = "btn btn-pill btn-primary";
    if ((book.stockQuantity ?? 0) <= 0) {
      cartBtn.disabled = true;
      cartBtn.textContent = "Out of stock";
    } else {
      cartBtn.textContent = "Add to cart";
      cartBtn.addEventListener("click", () => addToCart(book.id, book.title ?? "", book.price ?? 0));
    }
    actionRoot.appendChild(cartBtn);
  });
}

async function loadBooks() {
  const response = await fetch("/api/v1/books");
  if (!response.ok) return;
  renderBooks(await response.json());
}

async function searchBooks(event) {
  event.preventDefault();
  const keyword = document.getElementById("keyword").value;
  const response = await fetch(`/api/v1/books/search?keyword=${encodeURIComponent(keyword)}`);
  if (!response.ok) return;
  renderBooks(await response.json());
}

async function deleteBook(id) {
  if (!confirm("Delete this book?")) return;
  const response = await fetch(`/api/v1/books/${id}`, {
    method: "DELETE",
    headers: { [csrfHeader]: csrfToken }
  });
  if (response.ok) {
    await loadBooks();
  }
}

async function addToCart(id, name, price) {
  const body = new URLSearchParams({
    id: String(id),
    name: name,
    price: String(price),
    quantity: "1"
  });
  const response = await fetch("/books/add-to-cart", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded",
      [csrfHeader]: csrfToken
    },
    body: body.toString()
  });
  if (response.ok) {
    window.location.reload();
  }
}

loadBooks();
</script>
</body>
</html>
