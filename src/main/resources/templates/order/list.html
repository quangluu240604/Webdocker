<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>
<th:block th:replace="~{layout::link-css}"></th:block>
<th:block th:replace="~{layout::custom-css}"></th:block>
</head>
<body>
<th:block th:replace="~{layout::header}"></th:block>
<main class="page-content">
  <div class="page-section">
    <div class="section-header">
      <div>
        <p class="badge">Đơn hàng</p>
        <h2>My Orders</h2>
      </div>
      <a class="btn btn-pill btn-outline-dark" href="/books">Tiếp tục mua sắm</a>
    </div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${#lists.isEmpty(invoices)}" class="text-center py-5">
      <p class="text-secondary">Chưa có đơn hàng nào.</p>
      <a href="/books" class="btn btn-pill btn-primary">Shop now</a>
    </div>
    <div class="table-responsive" th:if="${not #lists.isEmpty(invoices)}">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>Invoice ID</th>
            <th>Date</th>
            <th>Status</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="invoice : ${invoices}">
            <td th:text="${invoice.id}"></td>
            <td th:text="${invoice.createdAt != null ? invoice.createdAt : 'N/A'}"></td>
            <td><span class="badge" th:text="${invoice.status != null ? invoice.status : 'N/A'}"></span></td>
            <td th:text="${invoice.totalAmount != null ? invoice.totalAmount : 0}"></td>
            <td class="d-flex flex-wrap gap-2 align-items-center">
              <a class="btn btn-outline-dark btn-sm" th:href="@{/orders/{id}(id=${invoice.id})}">View</a>
              <form th:action="@{/orders/{id}/delete(id=${invoice.id})}" th:method="post" sec:authorize="hasAuthority('ADMIN')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-sm btn-danger" type="submit">Delete</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>
<th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
