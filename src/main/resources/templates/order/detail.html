<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Detail</title>
<th:block th:replace="~{layout::link-css}"></th:block>
<th:block th:replace="~{layout::custom-css}"></th:block>
</head>
<body>
<th:block th:replace="~{layout::header}"></th:block>
<div class="container py-4" th:if="${invoice != null}">
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
<h2 class="mb-0">Order #<span th:text="${invoice.id}"></span></h2>
<div class="d-flex gap-2">
<a class="btn btn-outline-secondary" href="/orders">Back</a>
<form th:action="@{/orders/{id}/delete(id=${invoice.id})}" th:method="post" sec:authorize="hasAuthority('ADMIN')">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <button type="submit" class="btn btn-danger">Delete</button>
</form>
</div>
</div>
<div class="row g-3 mb-4">
<div class="col-md-4"><strong>Status:</strong> <span class="badge text-bg-warning" th:text="${invoice.status != null ? invoice.status : 'N/A'}"></span></div>
<div class="col-md-4"><strong>Date:</strong> <span th:text="${invoice.createdAt != null ? invoice.createdAt : 'N/A'}"></span></div>
<div class="col-md-4"><strong>Total:</strong> <span th:text="${invoice.totalAmount != null ? invoice.totalAmount : 0}"></span></div>
<div class="col-md-6"><strong>Receiver:</strong> <span th:text="${invoice.receiverName != null ? invoice.receiverName : 'N/A'}"></span></div>
<div class="col-md-6"><strong>Phone:</strong> <span th:text="${invoice.receiverPhone != null ? invoice.receiverPhone : 'N/A'}"></span></div>
<div class="col-12"><strong>Address:</strong> <span th:text="${invoice.shippingAddress != null ? invoice.shippingAddress : 'N/A'}"></span></div>
<div class="col-12"><strong>Note:</strong> <span th:text="${invoice.note != null && !#strings.isEmpty(invoice.note) ? invoice.note : 'N/A'}"></span></div>
</div>

<div class="table-responsive">
<table class="table align-middle">
<thead>
<tr>
<th>Book</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody>
<tr th:each="item : ${invoice.invoiceItems}">
<td th:text="${item.book != null ? item.book.title : 'N/A'}"></td>
<td th:text="${item.price}"></td>
<td th:text="${item.quantity}"></td>
<td th:text="${item.price * item.quantity}"></td>
</tr>
</tbody>
</table>
</div>
</div>
<th:block th:replace="~{layout::footer}"></th:block>
</body>
</html>
